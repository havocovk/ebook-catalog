[pytest]
# BU DOSYANIN YERİ ÇOK ÖNEMLİ:
# "scanner" klasörünün İÇİNE DEĞİL, scanner klasörünün BULUNDUĞU
# ÜST KLASÖRE konulmalıdır. Örnek klasör yapısı:
#
#   proje-klasorum/
#       pytest.ini          ← BU DOSYA BURAYA
#       scanner/
#           scan.py
#           metadata/
#               filename_parser.py
#               ...
#           api/
#               client.py
#               ...
#           tests/
#               test_filename_parser.py
#               ...
#
# Testleri çalıştırmak için terminalde "proje-klasorum" klasörüne
# girip sadece şunu yazmanız yeterlidir:
#   pytest

testpaths = scanner/tests
python_files = test_*.py
python_functions = test_*

# Bu satır kritik: pytest'e "scanner" paketini nereden bulacağını söyler.
# "." işareti, bu pytest.ini dosyasının bulunduğu klasörü ifade eder.
# Bu satır olmadan "ModuleNotFoundError: No module named 'scanner'" hatası alınır.
pythonpath = .