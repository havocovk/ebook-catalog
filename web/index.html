<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ebook Kataloğu</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://code.iconify.design/iconify-icon/3.0.2/iconify-icon.min.js"></script>
</head>
<body>

  <!-- ── Giriş Ekranı ────────────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-box">
      <h1 class="login-title">Ebook Kataloğu</h1>
      <p class="login-sub">Kişisel kitaplığın</p>
      <div class="field">
        <label for="login-email">E-posta</label>
        <input type="email" id="login-email" placeholder="orhan@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-password">Şifre</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p id="login-error" class="login-error"></p>
      <button id="login-btn" class="btn btn-primary btn-full">Giriş yap</button>
    </div>
  </div>

  <!-- ── Uygulama ────────────────────────────────────────────────── -->
  <div id="app-screen" class="hidden">

    <!-- Üst Bar -->
    <header class="header">
      <button id="nav-toggle" class="nav-toggle" aria-label="Menü">
        <iconify-icon icon="lucide:menu"></iconify-icon>
      </button>

      <span class="header-title">
        <iconify-icon icon="lucide:library"></iconify-icon>
        <span>Ebook Kataloğu</span>
      </span>

      <!-- Sıra: Panel → Katalog → Yazarlar → Yayınevleri → Seriler → Kitap Ayıklayıcı -->
      <nav id="main-nav" class="main-nav">
        <a href="#dashboard" data-nav="dashboard" class="nav-link">
          <iconify-icon icon="lucide:layout-dashboard"></iconify-icon><span>Panel</span>
        </a>
        <a href="#catalog" data-nav="catalog" class="nav-link">
          <iconify-icon icon="lucide:book-open"></iconify-icon><span>Katalog</span>
        </a>
        <a href="#authors" data-nav="authors" class="nav-link">
          <iconify-icon icon="lucide:users"></iconify-icon><span>Yazarlar</span>
        </a>
        <a href="#publishers" data-nav="publishers" class="nav-link">
          <iconify-icon icon="lucide:building-2"></iconify-icon><span>Yayınevleri</span>
        </a>
        <a href="#series" data-nav="series" class="nav-link">
          <iconify-icon icon="lucide:layers"></iconify-icon><span>Seriler</span>
        </a>
        <a href="#dedupe" data-nav="dedupe" class="nav-link">
          <iconify-icon icon="lucide:copy-x"></iconify-icon><span>Kitap Ayıklayıcı</span>
        </a>
      </nav>

      <div class="header-actions">
        <button id="backup-btn" class="btn btn-sm" title="Yedekle">
          <iconify-icon icon="lucide:download"></iconify-icon><span class="btn-label">Yedekle</span>
        </button>
        <button id="restore-btn" class="btn btn-sm" title="Yedekten yükle">
          <iconify-icon icon="lucide:upload"></iconify-icon><span class="btn-label">Yükle</span>
        </button>
        <input type="file" id="restore-input" accept=".json" hidden />
        <button id="logout-btn" class="btn btn-sm" title="Çıkış">
          <iconify-icon icon="lucide:log-out"></iconify-icon><span class="btn-label">Çıkış</span>
        </button>
      </div>
    </header>

    <!-- Yükleniyor -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Kitaplar yükleniyor...</span>
    </div>

    <!-- Sayfalar -->
    <main class="page-container">

      <!-- ── Katalog ───────────────────────────────────────────────── -->
      <section id="catalog-page" class="page">

        <!-- Araç çubuğu: arama + sıralama + görünüm + mobil filtre butonu -->
        <div class="toolbar">
          <div class="search-wrap">
            <iconify-icon icon="lucide:search" class="search-icon"></iconify-icon>
            <input type="text" id="search-input" placeholder="Başlık, yazar, seri..." class="search-input" />
          </div>

          <select id="sort-select" class="select">
            <option value="added_at_desc">Yeni eklenen</option>
            <option value="title_asc">Başlık A–Z</option>
            <option value="author_asc">Yazar A–Z</option>
            <option value="series_asc">Seri</option>
          </select>

          <span id="result-count" class="result-count"></span>

          <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="Izgara görünüm">
              <iconify-icon icon="lucide:layout-grid"></iconify-icon>
            </button>
            <button class="view-btn" data-view="list" title="Liste görünüm">
              <iconify-icon icon="lucide:list"></iconify-icon>
            </button>
          </div>

          <!-- Mobilde filtreyi açan buton (masaüstünde gizli) -->
          <button id="filter-toggle" class="btn btn-sm filter-toggle-btn" title="Filtreler">
            <iconify-icon icon="lucide:sliders-horizontal"></iconify-icon>
            <span>Filtrele</span>
            <span id="filter-badge" class="filter-badge hidden">0</span>
          </button>
        </div>

        <!-- Katalog gövdesi: sol panel + sağ ızgara -->
        <div class="catalog-body">

          <!-- Sol: filtre paneli (masaüstünde kalıcı, mobilde drawer) -->
          <aside id="filter-panel" class="filter-panel">
            <div class="filter-panel-header">
              <span class="filter-panel-title">
                <iconify-icon icon="lucide:sliders-horizontal"></iconify-icon> Filtreler
              </span>
              <button id="filter-clear" class="btn-link" title="Tüm filtreleri temizle">Temizle</button>
            </div>

            <div class="filter-group">
              <label class="filter-label">Format</label>
              <div class="filter-chips" id="filter-format-chips">
                <button class="chip active" data-filter="format" data-value="">Tümü</button>
                <button class="chip" data-filter="format" data-value="epub">EPUB</button>
                <button class="chip" data-filter="format" data-value="pdf">PDF</button>
              </div>
            </div>

            <div class="filter-group">
              <label class="filter-label">Durum</label>
              <div class="filter-chips" id="filter-status-chips">
                <button class="chip active" data-filter="status" data-value="">Tümü</button>
                <button class="chip" data-filter="status" data-value="okunmadi">Okunmadı</button>
                <button class="chip" data-filter="status" data-value="sirada">Sırada</button>
                <button class="chip" data-filter="status" data-value="okunuyor">Okunuyor</button>
                <button class="chip" data-filter="status" data-value="okundu">Okundu</button>
              </div>
            </div>

            <div class="filter-group">
              <label class="filter-label">Yazar</label>
              <select id="filter-author" class="select select-full">
                <option value="">Tümü</option>
              </select>
            </div>

            <div class="filter-group">
              <label class="filter-label">Yayınevi</label>
              <select id="filter-publisher" class="select select-full">
                <option value="">Tümü</option>
              </select>
            </div>

            <div class="filter-group filter-group--disabled" id="filter-series-wrap">
              <label class="filter-label">Seri</label>
              <select id="filter-series" class="select select-full" disabled>
                <option value="">— Önce yayınevi seçin —</option>
              </select>
            </div>

            <!-- ── Adım J4: Dil Filtresi ─────────────────────────────── -->
            <div class="filter-group">
              <label class="filter-label">Dil</label>
              <div class="filter-chips" id="filter-language-chips">
                <button class="chip active" data-filter="language" data-value="">Tümü</button>
                <button class="chip" data-filter="language" data-value="tr">🇹🇷 Türkçe</button>
                <button class="chip" data-filter="language" data-value="en">🇬🇧 İngilizce</button>
                <button class="chip" data-filter="language" data-value="de">🇩🇪 Almanca</button>
                <button class="chip" data-filter="language" data-value="fr">🇫🇷 Fransızca</button>
                <button class="chip" data-filter="language" data-value="es">🇪🇸 İspanyolca</button>
                <button class="chip" data-filter="language" data-value="it">🇮🇹 İtalyanca</button>
                <button class="chip" data-filter="language" data-value="ru">🇷🇺 Rusça</button>
                <button class="chip" data-filter="language" data-value="ar">🇸🇦 Arapça</button>
                <button class="chip" data-filter="language" data-value="ja">🇯🇵 Japonca</button>
                <button class="chip" data-filter="language" data-value="zh">🇨🇳 Çince</button>
                <button class="chip" data-filter="language" data-value="other">Diğer</button>
              </div>
            </div>

            <!-- ── Adım J4: Etiket Filtresi ──────────────────────────── -->
            <div class="filter-group" id="filter-tag-wrap">
              <label class="filter-label">Etiket</label>
              <div class="filter-chips" id="filter-tag-chips">
                <button class="chip active" data-filter="tag" data-value="">Tümü</button>
                <!-- Dinamik chip'ler catalog.js tarafından doldurulur -->
              </div>
            </div>
          </aside>

          <!-- Mobil filtre çekmece arka planı (tıklayınca kapanır) -->
          <div id="filter-overlay" class="filter-overlay hidden"></div>

          <!-- Sağ: kitap ızgarası + sayfalama -->
          <div class="catalog-main">
            <div id="books-grid" class="books-grid"></div>
            <div id="pagination" class="pagination"></div>
          </div>

        </div>
      </section>

      <!-- ── Panel ─────────────────────────────────────────────────── -->
      <section id="dashboard-page" class="page hidden">
        <div class="dashboard-wrap">
          <!-- dashboard.js bu div'in içini doldurur -->
          <div id="dashboard-content"></div>
        </div>
      </section>

      <!-- ── Yazarlar ───────────────────────────────────────────────── -->
      <section id="authors-page" class="page hidden">
        <div class="authors-wrap">
          <!-- authors.js bu div'in içini doldurur -->
          <div id="authors-content"></div>
        </div>
      </section>

      <!-- ── Yayınevleri ────────────────────────────────────────────── -->
      <section id="publishers-page" class="page hidden">
        <div class="authors-wrap">
          <!-- publishers.js bu div'in içini doldurur -->
          <div id="publishers-content"></div>
        </div>
      </section>

      <!-- ── Seriler ────────────────────────────────────────────────── -->
      <section id="series-page" class="page hidden">
        <div class="authors-wrap">
          <!-- series.js bu div'in içini doldurur -->
          <div id="series-content"></div>
        </div>
      </section>

      <!-- ── Kitap Ayıklayıcı ───────────────────────────────────────── -->
      <section id="dedupe-page" class="page hidden">
        <div class="authors-wrap">
          <!-- dedupe.js bu div'in içini doldurur -->
          <div id="dedupe-content"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- ── Kitap Detay Pop-up'ı ─────────────────────────────────────── -->
  <!-- Alan sırası: Kitap Adı → Yazar → Yayınevi → Seri → Durum/Yıl →
                   Puan → Bitirildi → Notlar → Etiketler              -->
  <div id="book-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-heading">Kitap Detayı</h2>
        <button id="modal-close" class="modal-close" title="Kapat">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-cover" id="modal-cover"></div>
        <div class="modal-fields">

          <!-- Kitap Adı -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:book-open"></iconify-icon> Kitap Adı
            </label>
            <input type="text" id="modal-title" />
          </div>

          <!-- Yazar -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:user"></iconify-icon> Yazar
            </label>
            <div class="entity-field" id="author-field">
              <button type="button" class="entity-trigger" id="author-trigger">
                <span class="entity-trigger-text placeholder">Seç...</span>
                <iconify-icon icon="lucide:chevron-down" class="entity-chevron"></iconify-icon>
              </button>
              <div class="entity-actions">
                <button type="button" class="entity-act" id="author-add" title="Yeni yazar ekle">
                  <iconify-icon icon="lucide:plus"></iconify-icon>
                </button>
                <button type="button" class="entity-act" id="author-edit" title="Seçili yazarı düzenle">
                  <iconify-icon icon="lucide:pencil"></iconify-icon>
                </button>
                <button type="button" class="entity-act entity-act-danger" id="author-delete" title="Seçili yazarı sil">
                  <iconify-icon icon="lucide:trash-2"></iconify-icon>
                </button>
              </div>
              <div class="entity-dropdown hidden" id="author-dropdown">
                <input type="text" class="entity-search" id="author-search" placeholder="Ara..." />
                <div class="entity-options" id="author-options"></div>
              </div>
              <input type="hidden" id="modal-author" />
            </div>
          </div>

          <!-- Yayınevi -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:building-2"></iconify-icon> Yayınevi
            </label>
            <div class="entity-field" id="publisher-field">
              <button type="button" class="entity-trigger" id="publisher-trigger">
                <span class="entity-trigger-text placeholder">Seç...</span>
                <iconify-icon icon="lucide:chevron-down" class="entity-chevron"></iconify-icon>
              </button>
              <div class="entity-actions">
                <button type="button" class="entity-act" id="publisher-add" title="Yeni yayınevi ekle">
                  <iconify-icon icon="lucide:plus"></iconify-icon>
                </button>
                <button type="button" class="entity-act" id="publisher-edit" title="Seçili yayınevini düzenle">
                  <iconify-icon icon="lucide:pencil"></iconify-icon>
                </button>
                <button type="button" class="entity-act entity-act-danger" id="publisher-delete" title="Seçili yayınevini sil">
                  <iconify-icon icon="lucide:trash-2"></iconify-icon>
                </button>
              </div>
              <div class="entity-dropdown hidden" id="publisher-dropdown">
                <input type="text" class="entity-search" id="publisher-search" placeholder="Ara..." />
                <div class="entity-options" id="publisher-options"></div>
              </div>
              <input type="hidden" id="modal-publisher" />
            </div>
          </div>

          <!-- Seri (yayınevine bağlı) -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:layers"></iconify-icon> Seri
            </label>
            <div class="entity-field" id="series-field">
              <button type="button" class="entity-trigger" id="series-trigger">
                <span class="entity-trigger-text placeholder">Seç...</span>
                <iconify-icon icon="lucide:chevron-down" class="entity-chevron"></iconify-icon>
              </button>
              <div class="entity-actions">
                <button type="button" class="entity-act" id="series-add" title="Yeni seri ekle">
                  <iconify-icon icon="lucide:plus"></iconify-icon>
                </button>
                <button type="button" class="entity-act" id="series-edit" title="Seçili seriyi düzenle">
                  <iconify-icon icon="lucide:pencil"></iconify-icon>
                </button>
                <button type="button" class="entity-act entity-act-danger" id="series-delete" title="Seçili seriyi sil">
                  <iconify-icon icon="lucide:trash-2"></iconify-icon>
                </button>
              </div>
              <div class="entity-dropdown hidden" id="series-dropdown">
                <input type="text" class="entity-search" id="series-search" placeholder="Ara..." />
                <div class="entity-options" id="series-options"></div>
              </div>
              <input type="hidden" id="modal-series" />
            </div>
            <p class="entity-hint hidden" id="series-hint">
              <iconify-icon icon="lucide:info"></iconify-icon>
              Seri seçmek için önce bir yayınevi seçin.
            </p>
          </div>

          <!-- Seri Sırası -->
          <div class="field-row">
            <div class="field field-narrow">
              <label>
                <iconify-icon icon="lucide:hash"></iconify-icon> Sıra
              </label>
              <input type="number" id="modal-series-order" min="1" />
            </div>
          </div>

          <!-- Durum + Yıl -->
          <div class="field-row">
            <div class="field">
              <label>
                <iconify-icon icon="lucide:bookmark"></iconify-icon> Durum
              </label>
              <select id="modal-status" class="select">
                <option value="okunmadi">Okunmadı</option>
                <option value="sirada">Sırada</option>
                <option value="okunuyor">Okunuyor</option>
                <option value="okundu">Okundu</option>
              </select>
            </div>
            <div class="field field-narrow">
              <label>
                <iconify-icon icon="lucide:calendar"></iconify-icon> Yıl
              </label>
              <input type="number" id="modal-year" min="1000" max="2099" />
            </div>
          </div>

          <!-- Dil -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:languages"></iconify-icon> Dil
            </label>
            <select id="modal-language" class="select">
              <option value="">Belirtilmemiş</option>
              <option value="tr">Türkçe</option>
              <option value="en">İngilizce</option>
              <option value="de">Almanca</option>
              <option value="fr">Fransızca</option>
              <option value="es">İspanyolca</option>
              <option value="it">İtalyanca</option>
              <option value="ru">Rusça</option>
              <option value="ar">Arapça</option>
              <option value="ja">Japonca</option>
              <option value="zh">Çince</option>
              <option value="other">Diğer</option>
            </select>
          </div>

          <!-- Puan -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:star"></iconify-icon> Puan
            </label>
            <div id="modal-rating" class="star-row"></div>
          </div>

          <!-- Bitirildi -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:check-circle"></iconify-icon> Bitirildi
            </label>
            <input type="date" id="modal-finished-at" />
          </div>

          <!-- Notlar -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:notebook-pen"></iconify-icon> Notlar
            </label>
            <textarea id="modal-notes" rows="3" placeholder="Kısa not..."></textarea>
          </div>

          <!-- Etiketler -->
          <div class="field">
            <label>
              <iconify-icon icon="lucide:tag"></iconify-icon>
              Etiketler <span class="hint">(virgülle ayır)</span>
            </label>
            <input type="text" id="modal-tags" placeholder="fantastik, klasik, okunacak" />
          </div>

          <!-- Dosya bilgisi (sadece okunur) -->
          <div class="file-meta">
            <span id="modal-format" class="badge"></span>
            <span id="modal-file-size" class="meta-text"></span>
            <span id="modal-file-path" class="meta-path"></span>
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-delete" class="btn btn-danger">
          <iconify-icon icon="lucide:trash-2"></iconify-icon> Sil
        </button>
        <button id="modal-save" class="btn btn-primary">
          <iconify-icon icon="lucide:save"></iconify-icon> Kaydet
        </button>
      </div>
    </div>
  </div>

  <!-- ── Custom Dialog (window.prompt / confirm yerine) ───────────────────── -->
  <div id="custom-dialog-overlay" class="custom-dialog-overlay hidden">
    <div class="custom-dialog-box" role="dialog" aria-modal="true">
      <p class="custom-dialog-message" id="custom-dialog-message"></p>
      <input
        type="text"
        class="custom-dialog-input hidden"
        id="custom-dialog-input"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="custom-dialog-actions">
        <button class="btn btn-sm" id="custom-dialog-cancel">İptal</button>
        <button class="btn btn-sm btn-primary" id="custom-dialog-ok">Tamam</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
